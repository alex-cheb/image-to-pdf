[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers for categorizing tests
markers =
    property: Property-based tests using Hypothesis
    unit: Unit tests for specific functionality
    integration: Integration tests across multiple components
    slow: Tests that take longer to run

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage settings (requires pytest-cov)
# Uncomment to enable coverage reporting
# addopts =
#     --cov=src
#     --cov-report=html
#     --cov-report=term-missing
#     --cov-fail-under=90

# Hypothesis settings
# Configure property-based testing behavior
# These can be overridden in individual tests
